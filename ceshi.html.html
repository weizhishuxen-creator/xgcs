<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理年龄测试 - 探索真实的内心世界</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 3rem 1.5rem;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        /* Progress Bar */
        .progress-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .progress-wrapper {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .progress-bar-bg {
            flex: 1;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 60px;
            text-align: right;
        }

        /* Main Content */
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 1rem 4rem;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .question-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            display: flex;
            gap: 0.5rem;
        }

        .question-num {
            color: var(--primary-color);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-item {
            position: relative;
        }

        .option-item input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item input:checked + .option-label {
            border-color: var(--primary-color);
            background-color: #eef2ff;
        }

        .option-prefix {
            width: 2rem;
            height: 2rem;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 700;
            margin-right: 1rem;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .option-item input:checked + .option-label .option-prefix {
            background: var(--primary-color);
            color: white;
        }

        /* Buttons */
        .btn-container {
            text-align: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 3rem;
            font-size: 1.125rem;
            font-weight: 700;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-reset {
            background-color: #f1f5f9;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        .btn-reset:hover {
            background-color: #e2e8f0;
        }

        /* Result Area */
        #result-area {
            display: none;
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid #e0e7ff;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .result-box {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 1rem;
        }

        .result-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary-color);
        }

        .result-eval {
            background: var(--primary-color);
            color: white;
            padding: 1.25rem;
            border-radius: 1rem;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            header { padding: 2rem 1rem; }
            .result-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>心理年龄测试</h1>
    <p>通过15道趣味题目，探索你内心最真实的年龄状态</p>
</header>

<div class="progress-container">
    <div class="progress-wrapper">
        <div class="progress-bar-bg">
            <div id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 15</div>
    </div>
</div>

<main>
    <div id="questions-container">
        <!-- 题目将通过 JS 动态生成 -->
    </div>

    <div id="test-controls" class="btn-container">
        <button class="btn btn-submit" id="submit-btn">提交测试</button>
    </div>

    <div id="result-area">
        <h2 class="result-title">测试结果分析</h2>
        <div class="result-grid">
            <div class="result-box">
                <div class="result-label">心理年龄</div>
                <div class="result-value" id="res-age">--</div>
            </div>
            <div class="result-box">
                <div class="result-label">测试总分</div>
                <div class="result-value" id="res-score">--</div>
            </div>
        </div>
        <div class="result-eval" id="res-eval">--</div>
        <button class="btn btn-reset" id="reset-btn">重新测试</button>
    </div>
</main>

<footer>
    <p>© 2026 心理年龄测试 · 仅供娱乐参考</p>
</footer>

<script>
    const questions = [
        {
            text: "你对新科技产品的态度是？",
            options: ["非常兴奋，总是第一时间尝试", "挺感兴趣，会关注流行趋势", "有需要才用，不刻意追求", "更习惯传统方式，觉得新东西麻烦"]
        },
        {
            text: "理想的周末你会如何度过？",
            options: ["去游乐园或进行户外冒险", "和朋友聚会、逛街或看电影", "在咖啡馆看书或在家安静休息", "打理园艺、做家务或陪伴家人"]
        },
        {
            text: "如果不小心犯了一个小错误，你会？",
            options: ["哈哈一笑，觉得没什么大不了", "赶紧想办法补救", "分析错误原因，避免再犯", "深感自责，长时间反思"]
        },
        {
            text: "你最喜欢的音乐风格通常是？",
            options: ["流行、电子或动感舞曲", "摇滚、民谣或独立音乐", "爵士、古典或轻音乐", "怀旧老歌或传统戏曲"]
        },
        {
            text: "面对压力时，你通常如何排解？",
            options: ["吃甜食、打游戏或大睡一场", "找朋友倾诉或去K歌", "运动健身或听音乐", "冥想、独处或写日记"]
        },
        {
            text: "你对时尚和穿搭的看法是？",
            options: ["追求个性，敢于尝试夸张风格", "紧跟潮流，注重搭配美感", "舒适为主，风格简洁大方", "经典稳重，不在意流行与否"]
        },
        {
            text: "关于金钱，你的消费观念更接近？",
            options: ["及时行乐，喜欢就买", "有计划地为心仪物品攒钱", "精打细算，注重性价比", "未雨绸缪，更看重长期储蓄"]
        },
        {
            text: "下雨天会让你产生什么样的联想？",
            options: ["想去踩水坑，觉得很有趣", "适合窝在沙发上看电影", "可以静下心来高效工作", "容易感到忧郁或怀念往事"]
        },
        {
            text: "你的社交圈子通常是？",
            options: ["有很多玩得来的熟人", "有一群志同道合的好友", "只有几个深交的知己", "以家庭和老同事为主"]
        },
        {
            text: "你对未来几年的规划是？",
            options: ["活在当下，没有太多具体规划", "有一些短期目标和梦想", "有清晰的职业或生活蓝图", "追求稳定，考虑养老或资产保值"]
        },
        {
            text: "在饮食习惯上，你更偏向？",
            options: ["喜欢零食、快餐或重口味", "喜欢尝试网红餐厅和新菜式", "注重营养均衡和清淡饮食", "偏爱家常菜或传统烹饪"]
        },
        {
            text: "学习新事物时，你习惯的方法是？",
            options: ["直接上手，在实践中摸索", "看视频教程或社交媒体分享", "阅读专业书籍或参加课程", "请教有经验的前辈或专家"]
        },
        {
            text: "你对规则和秩序的看法是？",
            options: ["规则就是用来打破或挑战的", "规则可以灵活变通", "规则是维持秩序的必要存在", "必须严格遵守，不能有偏差"]
        },
        {
            text: "你早晨起床后的第一反应通常是？",
            options: ["赖床，直到最后一刻才匆忙起床", "刷手机，看看有什么新鲜事", "简单运动或吃顿丰盛早餐", "早起并开始规划一天的任务"]
        },
        {
            text: "理想的旅行目的地你会选择？",
            options: ["充满活力的都市或夜生活丰富的城市", "风景优美的海滩或度假胜地", "具有深厚文化底蕴的历史遗迹", "宁静的乡村或避世的山林"]
        }
    ];

    const container = document.getElementById('questions-container');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const submitBtn = document.getElementById('submit-btn');
    const resetBtn = document.getElementById('reset-btn');
    const resultArea = document.getElementById('result-area');
    const testControls = document.getElementById('test-controls');

    // 动态生成题目
    function renderQuestions() {
        container.innerHTML = '';
        questions.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerHTML = `<span class="question-num">Q${i + 1}.</span> ${q.text}`;
            card.appendChild(title);

            const optionsList = document.createElement('div');
            optionsList.className = 'options-list';

            const labels = ['A', 'B', 'C', 'D'];
            q.options.forEach((optText, j) => {
                const item = document.createElement('div');
                item.className = 'option-item';
                item.innerHTML = `
                    <input type="radio" name="q${i}" value="${j + 1}" id="q${i}o${j}">
                    <label class="option-label" for="q${i}o${j}">
                        <span class="option-prefix">${labels[j]}</span>
                        <span>${optText}</span>
                    </label>
                `;
                optionsList.appendChild(item);
            });

            card.appendChild(optionsList);
            container.appendChild(card);
        });

        // 绑定事件监听
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', updateProgress);
        });
    }

    // 更新进度条
    function updateProgress() {
        const answered = new Set();
        document.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
            answered.add(radio.name);
        });
        const count = answered.size;
        const percent = (count / questions.length) * 100;
        progressFill.style.width = percent + '%';
        progressText.innerText = `${count} / ${questions.length}`;
    }

    // 提交逻辑
    submitBtn.addEventListener('click', () => {
        const checked = document.querySelectorAll('input[type="radio"]:checked');
        if (checked.length < questions.length) {
            alert(`请完成所有题目后再提交！(当前已完成 ${checked.length}/${questions.length})`);
            return;
        }

        let totalScore = 0;
        checked.forEach(radio => {
            totalScore += parseInt(radio.value);
        });

        // 计算心理年龄: 12 + (总分 - 15) * (70 - 12) / (60 - 15)
        const age = Math.round(12 + (totalScore - 15) * (70 - 12) / (60 - 15));
        
        let evalText = "";
        if (age <= 25) evalText = "童心未泯：你拥有一颗纯真好奇的心，对世界充满探索欲。";
        else if (age <= 40) evalText = "正值盛年：你平衡了活力与理智，正处于人生最精彩的阶段。";
        else if (age <= 55) evalText = "沉稳干练：你处事圆融，内心强大，是值得信赖的顶梁柱。";
        else evalText = "睿智通达：你洞察世事，心态平和，拥有超凡的智慧与气度。";

        document.getElementById('res-age').innerText = age;
        document.getElementById('res-score').innerText = totalScore;
        document.getElementById('res-eval').innerText = evalText;

        // 切换显示
        container.style.display = 'none';
        testControls.style.display = 'none';
        resultArea.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // 重置逻辑
    resetBtn.addEventListener('click', () => {
        resultArea.style.display = 'none';
        container.style.display = 'block';
        testControls.style.display = 'block';
        renderQuestions();
        updateProgress();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // 初始化
    renderQuestions();
</script>

</body>
</html>
